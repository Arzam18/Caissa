name: Build Caissa Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: List build output
        run: |
          ls -la build/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caissa-android-arm64
          path: |
            build/bin/caissa
            build/bin/eval-82-383B.pnn

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Caissa Android Build ${{ github.run_number }}
          prerelease: true
          files: |
            build/bin/caissa
            build/bin/eval-82-383B.pnn
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
